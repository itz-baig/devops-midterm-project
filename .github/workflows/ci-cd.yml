name: Quick-Task Hub — CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKERHUB_USERNAME: itzbaig
  BACKEND_IMAGE: itzbaig/fa23-bcs-201
  FRONTEND_IMAGE: itzbaig/fa23-bcs-201-frontend

jobs:
  # ── Stage 1: Build & Lint ──────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Verify backend files
        working-directory: ./backend
        run: |
          echo "✅ Backend files:"
          ls -la
          echo "✅ Node version: $(node -v)"
          echo "✅ NPM version: $(npm -v)"

  # ── Stage 2: Automated Tests ───────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Start backend server
        working-directory: ./backend
        env:
          MONGO_URI: mongodb://localhost:27017/taskdb_test
          PORT: 3000
        run: |
          node server.js &
          sleep 5
          echo "✅ Backend started"

      - name: Run API health check test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
          echo "Health endpoint status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Run tasks API test (POST + GET)
        run: |
          # Create a task
          RESP=$(curl -s -X POST http://localhost:3000/api/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"CI Test Task","priority":"high","status":"pending"}')
          echo "POST response: $RESP"
          TITLE=$(echo $RESP | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          if [ "$TITLE" != "CI Test Task" ]; then
            echo "❌ Task creation failed"
            exit 1
          fi
          echo "✅ Task creation test passed"

          # Get all tasks
          TASKS=$(curl -s http://localhost:3000/api/tasks)
          echo "GET tasks: $TASKS"
          echo "✅ GET tasks test passed"

  # ── Stage 3: Docker Build & Push ──────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # ── Stage 4: Deploy to Kubernetes (AKS) ───────────────────────────────────
  deploy:
    name: 🚀 Deploy to AKS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: devops-midterm-rg
          cluster-name: student-app-aks

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/mongo-pvc.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Force rollout with latest images
        run: |
          kubectl rollout restart deployment/quick-task-backend
          kubectl rollout restart deployment/quick-task-frontend

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/quick-task-backend --timeout=120s
          kubectl rollout status deployment/quick-task-frontend --timeout=120s

      - name: Show running pods
        run: |
          echo "=== Pods ==="
          kubectl get pods
          echo "=== Services ==="
          kubectl get svc
