# ── Networks ────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # ── MongoDB Database ───────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: task-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Backend API (Node.js / Express) ────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quick-task-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskdb
      - PORT=3000
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-network

  # ── Frontend (Nginx serving static HTML) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quick-task-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app
    networks:
      - app-network
